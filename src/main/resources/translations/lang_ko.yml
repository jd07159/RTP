# - - - - - - - - - - - - - -
# - 메시지 파일 - 한국어 -
# - - - - - - - - - - - - - -
# 이 플러그인에서 게임 내에 전송되는 모든 메시지는 여기에 저장됩니다 (그리고 미래에는 다른 언어에 대한 다른 파일에도 저장됩니다).
# (수정: 권한 거부 메시지는 plugin.yml 파일에 있으며 거기에서만 수정할 수 있습니다)
# 이 파일은 직접 편집해서는 안 되며, 대신 `language-settings.yml`에서 메시지 재정의를 작성하기 위한 참조로 사용해야 합니다.
# 모든 메시지에는 간략한 설명과 각 자리 표시자가 나타내는 내용에 대한 설명이 있습니다.
# # # # # # # # # # # # # # # # #

# RTP 작업이 허용되지 않을 때 (예: RTP를 허용하지 않는 월드에서 RTP를 시도할 때)
# {0} - 작업이 거부된 이유
not-permitted-generic: '<gray>[<#ff55a3>RTP</#ff55a3>]</gray> <red>다음 이유로 RTP할 수 없습니다: <white>{0}'
# RTP 작업이 문제로 인해 거부될 때 (예: RTP 위치를 기다리는 동안 예외가 발생할 때)
# {0} - 이 메시지가 나타나게 한 예외의 메시지
# 참고: 이는 항상 콘솔의 스택 추적과 함께 표시됩니다 (구성할 수 없음).
not-permitted-major-error: '<gray>[<#ff55a3>RTP</#ff55a3>]</gray> <red>오류: 다음 이유로 RTP할 수 없습니다: <white>{0} \n<red>텔레포트 실패 이유에 대한 자세한 내용은 콘솔을 확인하십시오.'
# 작업이 거부된 이유가 월드에서 RTP가 활성화되지 않았기 때문일 때
# {0} - 디버깅에 도움이 되는 식별자
not-enabled-in-this-world: '<gray>[<#ff55a3>RTP</#ff55a3>]</gray> 이 월드에서 RTP가 활성화되지 않았습니다. {0}'
# 주어진 이름으로 rtpSettings를 찾을 수 없을 때
# {0} - 주어진 이름
no-settings-found-with-name: '<gray>[<#ff55a3>RTP</#ff55a3>]</gray> 이름 {0}으로 RTP 설정을 찾을 수 없습니다.'
# 특정 플레이어가 검색했을 때 주어진 이름으로 rtpSettings를 찾을 수 없을 때
# 이는 주어진 이름의 rtpSettings가 존재하지 않거나, `/rtp <settingsName>` 명령을 실행한 플레이어가 찾은 설정을 사용할 권한이 없는 경우 모두 표시됩니다.
# {0} - 주어진 이름
no-settings-found-with-name-for-player: '<gray>[<#ff55a3>RTP</#ff55a3>]</gray> 이름 {0}으로 RTP 설정을 찾을 수 없습니다.'
# 플러그인이 성공 없이 포인트를 찾기 위해 너무 많은 시도를 했을 때
too-many-failed-attempts: '<gray>[<#ff55a3>RTP</#ff55a3>]</gray> <red>안전한 위치 찾기에 실패하였습니다! 다시 시도하세요.'
# 플러그인이 플레이어 이름을 예상하지만 플레이어 이름을 받지 못할 때
# {0} - 플레이어와 일치하지 않는 주어진 이름
player-not-found: '<gray>[<#ff55a3>RTP</#ff55a3>]</gray> 플레이어 {0}을(를) 찾을 수 없습니다.'
# 월드 이름이 예상되지만 받지 못할 때
# {0} - 월드 이름과 일치하지 않는 주어진 이름
world-not-found: '<gray>[<#ff55a3>RTP</#ff55a3>]</gray> 월드 {0}을(를) 찾을 수 없습니다.'
# 주어진 rtpSettings가 주어진 월드를 포함해야 하지만 포함하지 않을 때
# {0} - rtpSetting의 이름
# {1} - 월드의 이름
rtp-settings-no-contain-world: '<gray>[<#ff55a3>RTP</#ff55a3>]</gray> 입력 불일치: RTP 설정 "{0}"에는 활성화된 월드 중 하나로 월드 "{1}"이(가) 포함되어 있지 않습니다.'
# 주어진 rtpSettings가 한 월드에만 사람들을 착륙시킬 수 있지만 다른 월드가 대신 요청될 때
# {0} - rtpSetting의 이름
# {1} - 유일하게 유효한 월드 이름
rtp-settings-must-use-world: '<gray>[<#ff55a3>RTP</#ff55a3>]</gray> 입력 불일치: RTP 설정 "{0}"은(는) 월드 "{1}"에서만 사람들을 텔레포트할 수 있습니다.'
# 플레이어가 명령을 다시 실행하기 전에 쿨다운을 기다려야 할 때
# {0} - 쿨다운 시간 (아래 정의된 READABLE-TIME 사용)
need-to-wait-for-cooldown: '<gray>[<#ff55a3>RTP</#ff55a3>]</gray> <#ccccff>쿨다운을 기다려야 합니다: <#ff55a3>{0}'
# 플레이어가 텔레포트 전에 워밍업을 기다리는 중일 때 (warmup.time이 0보다 큰 경우에만 사용됨)
# {0} - 남은 초 수
teleporting-in-x-seconds: '<gray>[<#ff55a3>RTP</#ff55a3>]</gray> <#ff55a3>{0}<#ccccff>초 후에 텔레포트 됩니다.'
# 플레이어가 RTP 워밍업 중에 이동하여 취소할 때 (warmup.time이 0보다 큰 경우에만 사용됨)
moved-during-warmup: '<gray>[<#ff55a3>RTP</#ff55a3>]</gray> <red>움직임이 감지되어 RTP가 취소되었습니다.'
# 플레이어가 워밍업을 기다리는 동안 `/rtp`를 다시 호출할 때 (warmup.time이 0보다 큰 경우에만 사용됨)
rtp-called-while-in-warmup: '<gray>[<#ff55a3>RTP</#ff55a3>]</gray> <red>이미 RTP를 실행중입니다!'
# 무언가에 돈이 들지만 플레이어에게 충분한 돈이 없을 때
# {0} - 비용
# {1} - 플레이어의 잔액
not-enough-money: '<gray>[<#ff55a3>RTP</#ff55a3>]</gray> 이 작업을 수행할 충분한 돈이 없습니다. 비용: {0}. 잔액: {1}.'
# 플레이어가 명령을 실행할 충분한 돈을 가지고 있었지만 요금이 청구될 때까지 충분한 돈이 없을 때
# 이는 플레이어가 워밍업이 끝나기 전에 잔액을 비워 지불을 피하려고 할 때만 발생합니다.
no-longer-enough-money: '<gray>[<#ff55a3>RTP</#ff55a3>]</gray> 이 작업을 수행하는 데 필요한 자금이 더 이상 없습니다.'
# 플레이어에게 요금이 청구될 때
# {0} - 청구된 금액
# {1} - 플레이어가 남은 금액
you-were-charged-x: '<gray>[<#ff55a3>RTP</#ff55a3>]</gray> {0}이(가) 청구되었으며 이제 {1}이(가) 남았습니다.'
# 경제 오류가 발생할 때 (이 오류는 거의 발생하지 않음)
# {0} - 경제 오류 텍스트
economy-error: '<gray>[<#ff55a3>RTP</#ff55a3>]</gray> 경제 오류가 발생했습니다: {0}'
# READABLE-TIME - 이는 특수한 경우의 메시지입니다. 시간이 표시되어야 할 때마다 형식을 지정하는 데 사용됩니다. 또한 각 '단어'는 관련 숫자 값이 0보다 큰 경우에만 표시됩니다.
# 예: 8675초는 다음과 같이 형식이 지정됩니다: `2시간, 24분, 35초.` 날짜가 없는 것에 유의하십시오.
readable-time: '{0}{1}{2}{3}'
readable-time-word-days: '{0}일, '
readable-time-word-hours: '{0}시간, '
readable-time-word-minutes: '{0}분, '
readable-time-word-seconds: '{0}초.'
